<div class="pagination-container">
  <div class="pagination-info">
    Показано
    <strong>{{ startItem }}</strong>
    -
    <strong>{{ endItem }}</strong>
    з <strong>{{ totalCount }}</strong> {{ itemName }}
  </div>

  <div class="pagination-controls">
    <div class="page-buttons">
      <button class="btn-page" [disabled]="currentPage === 1" (click)="onPrev()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <span class="page-indicator">Сторінка {{ currentPage }} з {{ totalPages }}</span>

      <button class="btn-page" [disabled]="currentPage >= totalPages" (click)="onNext()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>
  </div>
</div>
