<div class="inventory-card" [class.warning-card]="isLowStock">

  @if (isLowStock) {
    <div class="warning-badge">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>
      </svg>
      Мало запасу
    </div>
  }

  <div class="card-header">
    <div class="icon-box" [class.warning-icon]="isLowStock">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/>
      </svg>
    </div>
    <div class="info">
      <h3>{{ title }}</h3>
      <p>{{ brand }}</p>
    </div>
  </div>

  <div class="stock-info">
    <div class="stock-labels">
      <span class="label">Залишок:</span>
      <span class="value" [class.text-warning]="isLowStock">{{ currentStock }} {{ unit }}</span>
    </div>

    <div class="progress-bg">
      <div class="progress-fill"
           [style.width.%]="getPercentage()"
           [class.fill-warning]="isLowStock"
           [class.fill-success]="!isLowStock">
      </div>
    </div>

    <div class="min-label">Мінімальний поріг: {{ minStock }} {{ unit }}</div>
  </div>

  <div class="inventory-card" [class.warning-card]="isLowStock">
    <div class="card-actions" style="display: flex; gap: 8px; margin-top: auto;">
      <button class="btn-edit" (click)="onEditClick($event)" style="flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #BAE6FD; background: #F0F9FF; color: #0369A1; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Змінити
      </button>

      <button class="btn-delete" (click)="onDeleteClick($event)" style="padding: 10px; border-radius: 10px; border: 1px solid #FECACA; background: #FEF2F2; color: #DC2626; cursor: pointer;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>
  </div>
</div>
