<div class="page-container">
  <header class="page-header">
    <div>
      <h1>Медичні записи</h1>
      <p>Історія оглядів та вакцинацій</p>
    </div>

    <div class="header-actions" style="display: flex; gap: 12px;">
      <button class="btn-outline-pink" (click)="openAddVaccine()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">

          <path d="m18 2 4 4"/><path d="m17 7 3-3"/><path d="M19 9 8.7 19.3c-1 1-2.5 1-3.4 0l-.6-.6c-1-1-1-2.5 0-3.4L15 5"/><path d="m9 11 4 4"/><path d="m5 19-3 3"/><path d="m14 4 6 6"/>

        </svg>
        Вакцина</button>
      <button class="btn-pink" (click)="openAddExam()">Новий огляд</button>
    </div>
  </header>

  <div class="filter-bar">
    <div class="search-box">
      <span class="search-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
      </span>
      <input type="text" placeholder="Пошук пацієнта..." [(ngModel)]="searchQuery" (keyup.enter)="onSearch()">
    </div>

    <div class="filter-toggles">
      <button class="toggle-btn" [class.active]="activeTab === 'vaccines'" (click)="activeTab = 'vaccines'">Вакцинації</button>
      <button class="toggle-btn" [class.active]="activeTab === 'exams'" (click)="activeTab = 'exams'">Огляди</button>
    </div>
  </div>

  <div class="records-list">
    @if (activeTab === 'exams') {
      <app-medical-exams-tab [searchQuery]="searchQuery"></app-medical-exams-tab>
    }
    @else {
      <app-vaccinations-tab [searchQuery]="searchQuery"></app-vaccinations-tab>
    }
  </div>
</div>
