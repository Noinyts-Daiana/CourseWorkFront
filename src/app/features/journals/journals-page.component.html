<div class="page-container">
  <header class="page-header">
    <div>
      <h1>Журнали подій</h1>
      <p>Історія годувань, транзакцій та активностей</p>
    </div>
  </header>

  <div class="table-card">
    <div class="tabs-nav">
      <button class="tab-btn" [class.active]="activeTab() === 'feeding'" (click)="switchTab('feeding')">Журнал годувань</button>
      <button class="tab-btn" [class.active]="activeTab() === 'finance'" (click)="switchTab('finance')">Фінансові транзакції</button>
      <button class="tab-btn" [class.active]="activeTab() === 'users'" (click)="switchTab('users')">Активність користувачів</button>
    </div>

    @if (activeTab() === 'finance') {
      <app-finance-journal />
    }

    @if (activeTab() === 'feeding') {
      <app-feeding-journal />
    }

    @if (activeTab() === 'users') {
      <app-users-activity-journal />
    }
  </div>
</div>
